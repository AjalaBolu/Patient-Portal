{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-lg border-0">
        <div class="card-header" style="background-color: #212529; color: #fff;">
            <h4 class="mb-0">Add Prescription for {{ patient.first_name }} {{ patient.last_name }}</h4>
        </div>
        <div class="card-body">
            <form method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-success">
                    💊 Save Prescription
                </button>
                <a href="{% url 'medical:prescription_list' patient.id %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
