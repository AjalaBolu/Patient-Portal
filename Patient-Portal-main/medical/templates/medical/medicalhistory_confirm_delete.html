{% extends "base.html" %}
{% block content %}
  <h2>Delete Medical History</h2>

  <p>Are you sure you want to delete the record for "<strong>{{ history.condition }}</strong>" diagnosed on <strong>{{ history.date_diagnosed }}</strong>?</p>

  <form method="post">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
      <a href="{% url 'patients:patient_detail' history.patient.pk %}">Cancel</a>
  </form>
{% endblock %}
