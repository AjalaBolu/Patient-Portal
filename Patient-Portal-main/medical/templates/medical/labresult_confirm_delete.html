{% extends "base.html" %}
{% block content %}
<h2>Confirm Delete</h2>
<p>Are you sure you want to delete this lab result for <strong>{{ labresult.patient.user.get_full_name }}</strong>?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, Delete</button>
  <a href="{% url 'medical:labresult_list' labresult.patient.id %}">Cancel</a>
</form>
{% endblock %}
