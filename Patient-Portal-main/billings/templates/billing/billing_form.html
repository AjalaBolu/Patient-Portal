{% extends "base.html" %}
{% block content %}
<h2>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Billing Record</h2>

<form method="post">
  {% csrf_token %}
  {{ form.as_p }}

</form>

<a href="{% url 'billing:billing_list' %}">Back to Billing List</a>
{% endblock %}
