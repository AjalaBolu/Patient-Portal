<!-- templates/home.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Portal - Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        /* Full page background */
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1588776814546-32b9b8f1d0ef?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Card styling */
        .portal-card {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            border-radius: 1rem;
            padding: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .portal-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 4rem;
            color: #0d6efd;
        }

        .overlay {
            background-color: rgba(0,0,0,0.5);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        h1, p.lead {
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>
    <div class="container text-center mt-5">
        <h1 class="mb-3 fw-bold">Welcome to the Hospital Portal</h1>
        <p class="lead mb-5">Select your portal to continue</p>

        <div class="row justify-content-center g-4">
            <!-- Admin Portal -->
            <div class="col-md-4">
                <a href="/login" class="text-decoration-none">
                    <div class="portal-card shadow">
                        <div class="icon mb-3">
                            <i class="bi bi-shield-lock-fill"></i>
                        </div>
                        <h4 class="fw-bold">Admin Portal</h4>
                        <p class="text-muted">For hospital staff and doctors</p>
                    </div>
                </a>
            </div>

            <!-- Patient Portal -->
            <div class="col-md-4">
                <a href="/patient_portal/login" class="text-decoration-none">
                    <div class="portal-card shadow">
                        <div class="icon mb-3">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <h4 class="fw-bold">Patient Portal</h4>
                        <p class="text-muted">For patients to view their records</p>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
