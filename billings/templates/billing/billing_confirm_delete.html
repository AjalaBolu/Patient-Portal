{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="card-title mb-3 text-danger">Confirm Delete</h2>
      <p>Are you sure you want to delete this billing record for <strong>{{ record.patient.user.get_full_name }}</strong>?</p>
      
      <form method="post" class="d-flex gap-2 mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'billing:billing_list' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
