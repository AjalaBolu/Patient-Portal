{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-dark">➕ Add Medical Record</h2>
  </div>

  <!-- Form Card -->
  <div class="card shadow-lg border-0 bg-dark text-light">
    <div class="card-body">
      <form method="post" class="needs-validation" novalidate>
        {% csrf_token %}
        
        <!-- Render form fields nicely -->
        <div class="mb-3">
          {{ form.as_p }}
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-end">
          <a href="{% url 'medical:medical_list' %}" class="btn btn-outline-secondary me-2">
            <i class="bi bi-arrow-left"></i> Cancel
          </a>
          <button type="submit" class="btn btn-success shadow-sm">
            <i class="bi bi-check-circle me-1"></i> Save Record
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
