{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg border-0" style="background-color: #2c3034; color: #f8f9fa; border-radius: 12px;">
    <div class="card-body text-center">
      <h2 class="mb-4 text-danger">⚠️ Confirm Delete</h2>
      <p class="fs-5">
        Are you sure you want to delete the prescription for 
        <strong class="text-warning">{{ prescription.patient.user.get_full_name }}</strong>?
      </p>

      <form method="post" class="d-flex justify-content-center gap-3 mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4 py-2 rounded-pill shadow-sm">
          Yes, Delete
        </button>
        <a href="{% url 'medical:prescription_list' prescription.patient.id %}" 
           class="btn btn-secondary px-4 py-2 rounded-pill shadow-sm">
          Cancel
        </a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
